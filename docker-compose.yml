services:
  mongo:
    image: mongodb/mongodb-community-server:latest
    container_name: app_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: rootpass
      MONGO_INITDB_DATABASE: app
    volumes:
      - mongo_data:/data/db
    networks:
      - app_net

  mongo_express:
    image: mongo-express:latest
    container_name: app_mongo_express
    restart: unless-stopped
    depends_on:
      - mongo
    ports:
      - "8081:8081"
    environment:
      # Conecta no service "mongo" pela rede do compose
      ME_CONFIG_MONGODB_SERVER: mongo
      ME_CONFIG_MONGODB_PORT: 27017

      # Autenticação no Mongo (root normalmente autentica em admin)
      ME_CONFIG_MONGODB_ADMINUSERNAME: root
      ME_CONFIG_MONGODB_ADMINPASSWORD: rootpass
      ME_CONFIG_MONGODB_AUTH_DATABASE: admin

      # (Opcional) Login no painel do mongo-express
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: adminpass
    networks:
      - app_net

  redis:
    image: redis:latest
    container_name: app_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    networks:
      - app_net

  redisinsight:
    image: redis/redisinsight:latest
    container_name: app_redisinsight
    restart: unless-stopped
    depends_on:
      - redis
    ports:
      - "5540:5540"
    volumes:
      - redisinsight_data:/data
    networks:
      - app_net

volumes:
  mongo_data:
  redis_data:
  redisinsight_data:

networks:
  app_net:
    driver: bridge
